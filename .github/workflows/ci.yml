name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify frontend static files exist
        run: |
          test -f frontend/index.html
          test -f frontend/styles.css
          test -f frontend/app.js

      - name: Python syntax check - Agent A
        run: python -m py_compile $(find agent-system-a/app -name "*.py")

      - name: Python syntax check - Agent B
        run: python -m py_compile $(find agent-system-b/app -name "*.py")

      - name: Python syntax check - MCP server
        run: python -m py_compile $(find mcp-server/app -name "*.py")

      - name: Build Agent A Docker image
        run: docker build -t smart-agri-agent-a ./agent-system-a

      - name: Build Agent B Docker image
        run: docker build -t smart-agri-agent-b ./agent-system-b

      - name: Build MCP Server Docker image
        run: docker build -t smart-agri-mcp ./mcp-server

      - name: Build Frontend Docker image
        run: docker build -t smart-agri-frontend ./frontend