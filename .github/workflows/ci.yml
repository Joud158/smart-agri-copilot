name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python setup for all backend services.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Agent A dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent-system-a/requirements.txt

      - name: Install Agent B dependencies
        run: |
          pip install -r agent-system-b/requirements.txt

      - name: Install MCP dependencies
        run: |
          pip install -r mcp-server/requirements.txt

      - name: Syntax check Python
        run: |
          python -m compileall agent-system-a/app
          python -m compileall agent-system-b/app
          python -m compileall mcp-server/app
          python -m compileall scripts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      # Docker build validation is important because the rubric evaluates
      # deployability, not only local script execution.
      - name: Build Docker images
        run: docker compose build
