name: CD-GHCR

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags:
      - "v*"

jobs:
  publish-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/agent-system-a
            ghcr.io/${{ github.repository }}/agent-system-b
            ghcr.io/${{ github.repository }}/mcp-server
            ghcr.io/${{ github.repository }}/frontend

      - name: Build and push Agent A
        uses: docker/build-push-action@v6
        with:
          context: ./agent-system-a
          push: true
          tags: ghcr.io/${{ github.repository }}/agent-system-a:latest

      - name: Build and push Agent B
        uses: docker/build-push-action@v6
        with:
          context: ./agent-system-b
          push: true
          tags: ghcr.io/${{ github.repository }}/agent-system-b:latest

      - name: Build and push MCP Server
        uses: docker/build-push-action@v6
        with:
          context: ./mcp-server
          push: true
          tags: ghcr.io/${{ github.repository }}/mcp-server:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
