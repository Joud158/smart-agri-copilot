name: CD-DockerHub

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags:
      - "v*"

jobs:
  publish-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Agent A
        uses: docker/build-push-action@v6
        with:
          context: ./agent-system-a
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smart-agri-agent-a:latest

      - name: Build and push Agent B
        uses: docker/build-push-action@v6
        with:
          context: ./agent-system-b
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smart-agri-agent-b:latest

      - name: Build and push MCP Server
        uses: docker/build-push-action@v6
        with:
          context: ./mcp-server
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smart-agri-mcp-server:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smart-agri-frontend:latest