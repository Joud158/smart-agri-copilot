services:
  agent-system-a:
    build:
      context: ./agent-system-a
    container_name: smart-agri-agent-a
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./runtime/agent-a:/data
      - ./data:/workspace/data:ro
      - ./scripts:/app/scripts:ro
      - ./evaluation:/workspace/evaluation:ro
    depends_on:
      - vector-db
      - agent-system-b
      - mcp-server
    ports:
      - "8101:8101"
    networks:
      - public-net
      - internal-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/health', timeout=5)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  agent-system-b:
    build:
      context: ./agent-system-b
    container_name: smart-agri-agent-b
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./runtime/agent-b:/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8102/health', timeout=5)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  mcp-server:
    build:
      context: ./mcp-server
    container_name: smart-agri-mcp
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./runtime/mcp:/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8103/health', timeout=5)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  vector-db:
    image: qdrant/qdrant:latest
    container_name: smart-agri-qdrant
    restart: unless-stopped
    volumes:
      - ./runtime/qdrant:/qdrant/storage
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6333/collections', timeout=5)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    container_name: smart-agri-frontend
    restart: unless-stopped
    environment:
      VITE_AGENT_A_URL: http://localhost:8101
    depends_on:
      - agent-system-a
    ports:
      - "3000:3000"
    networks:
      - public-net

networks:
  public-net:
    driver: bridge
  internal-net:
    driver: bridge
    internal: true
