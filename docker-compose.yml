services:
  # ----------------------------
  # Primary system required by the rubric:
  # LangGraph + FastAPI + business logic.
  # ----------------------------
  agent-system-a:
    build:
      context: ./agent-system-a
    container_name: smart-agri-agent-a
    env_file:
      - ./.env
    volumes:
      # Persist local session history across restarts.
      - ./runtime/agent-a:/data
      # Mount domain data read-only so reindexing can inspect corpus files.
      - ./data:/workspace/data:ro
      # Mount helper scripts used for ingestion and evaluation.
      - ./scripts:/app/scripts:ro
    depends_on:
      - vector-db
      - agent-system-b
      - mcp-server
    ports:
      - "8101:8101"
    networks:
      - public-net
      - internal-net

  # ----------------------------
  # Independent secondary service:
  # different stack / own logic / separate API.
  # We keep it isolated and only reachable via HTTP.
  # ----------------------------
  agent-system-b:
    build:
      context: ./agent-system-b
    container_name: smart-agri-agent-b
    env_file:
      - ./.env
    volumes:
      - ./runtime/agent-b:/data
    ports:
      - "8102:8102"
    networks:
      - internal-net

  # ----------------------------
  # Dedicated MCP server container.
  # Canonical tools live here.
  # A lightweight REST bridge is also exposed
  # so Agent A can call the same tool logic easily.
  # ----------------------------
  mcp-server:
    build:
      context: ./mcp-server
    container_name: smart-agri-mcp
    env_file:
      - ./.env
    volumes:
      - ./runtime/mcp:/data
    ports:
      - "8103:8103"
    networks:
      - internal-net

  # ----------------------------
  # Vector database required by the rubric.
  # Qdrant is explicitly allowed and docker-friendly.
  # ----------------------------
  vector-db:
    image: qdrant/qdrant:latest
    container_name: smart-agri-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./runtime/qdrant:/qdrant/storage
    networks:
      - internal-net

  # ----------------------------
  # Optional presentation frontend.
  # Not required by the rubric, but useful for demo polish.
  # ----------------------------
  frontend:
    build:
      context: ./frontend
    container_name: smart-agri-frontend
    environment:
      VITE_AGENT_A_URL: http://localhost:8101
    depends_on:
      - agent-system-a
    ports:
      - "3000:3000"
    networks:
      - public-net

networks:
  # Public network:
  # used for externally visible HTTP services.
  public-net:
    driver: bridge

  # Internal network:
  # used for service-to-service traffic only.
  # This demonstrates the “exposed vs private” separation your instructor mentioned.
  internal-net:
    driver: bridge
    internal: true
